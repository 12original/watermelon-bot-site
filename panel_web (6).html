<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍉 WatermelonBOT Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --bg1:      #0e0e1a;
  --bg2:      #131324;
  --bg3:      #1a1a30;
  --bg4:      #22223e;
  --border:   #ffffff0f;
  --glow:     #6c63ff;
  --glow2:    #ff6584;
  --green:    #00ffa3;
  --yellow:   #ffd166;
  --red:      #ff4d6d;
  --blue:     #4fc3f7;
  --purple:   #c084fc;
  --text:     #f0f0ff;
  --text2:    #6060a0;
  --text3:    #30305a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── CANVAS BACKGROUND ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── TOPBAR ── */
#topbar {
  position: relative;
  z-index: 10;
  background: rgba(14,14,26,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 60px;
  flex-shrink: 0;
  gap: 14px;
}

#logo-wrap { display: flex; flex-direction: column; gap: 1px; }
#logo {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--glow), var(--glow2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}
#ver { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  margin-left: 8px;
}
#status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  transition: all .4s;
  flex-shrink: 0;
}
#status-dot.online { background: var(--green); box-shadow: 0 0 10px var(--green); animation: statusPulse 2s ease-in-out infinite; }
@keyframes statusPulse { 0%,100%{ box-shadow: 0 0 8px var(--green); } 50%{ box-shadow: 0 0 18px var(--green), 0 0 30px var(--green)44; } }
#status-txt { font-size: 11px; color: var(--text2); transition: color .4s; }

#topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

#token-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  transition: border-color .2s;
}
#token-wrap:focus-within { border-color: var(--glow)66; box-shadow: 0 0 0 3px var(--glow)11; }
#token-input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 11px; width: 200px;
}
#token-input::placeholder { color: var(--text3); }
#token-eye { cursor: pointer; color: var(--text3); font-size: 12px; transition: color .2s; }
#token-eye:hover { color: var(--text2); }

.top-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 8px;
  cursor: pointer;
  padding: 7px 14px;
  font-size: 11px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  transition: all .18s;
  white-space: nowrap;
}
.top-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); border-color: var(--glow)33; }
.top-btn.green  { background: var(--green)15; border-color: var(--green)44; color: var(--green); }
.top-btn.green:hover { background: var(--green)25; box-shadow: 0 0 16px var(--green)33; }
.top-btn.red    { background: var(--red)15; border-color: var(--red)44; color: var(--red); }
.top-btn.yellow { background: var(--yellow)15; border-color: var(--yellow)44; color: var(--yellow); }
.top-btn.blue   { background: var(--blue)15; border-color: var(--blue)44; color: var(--blue); }

/* ── BODY ── */
#body {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 230px;
  flex-shrink: 0;
  background: rgba(14,14,26,0.7);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sb-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 2px;
  padding: 16px 16px 6px;
  text-transform: uppercase;
}

.list-box {
  margin: 0 8px 4px;
  border-radius: 10px;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 140px;
}

.list-item {
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text2);
  transition: all .15s;
  border-radius: 8px;
  margin: 2px 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.list-item.active {
  background: linear-gradient(135deg, var(--glow)22, var(--glow2)11);
  color: var(--text);
  border: 1px solid var(--glow)22;
}

.divider { height: 1px; background: var(--border); margin: 6px 12px; }

#member-search {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  outline: none;
  color: var(--text2);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  width: calc(100% - 16px);
  padding: 7px 11px;
  border-radius: 8px;
  margin: 0 8px 4px;
  transition: border-color .2s;
}
#member-search:focus { border-color: var(--glow)44; color: var(--text); }
#member-search::placeholder { color: var(--text3); }

#member-list {
  flex: 1;
  overflow-y: auto;
  margin: 0 8px;
  padding-bottom: 4px;
}

#sel-label {
  font-size: 11px;
  color: var(--text3);
  padding: 8px 16px 12px;
  font-style: italic;
  flex-shrink: 0;
  transition: color .3s;
}

/* ── MAIN ── */
#main {
  width: 480px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: rgba(10,10,20,0.5);
  backdrop-filter: blur(10px);
}

#nav {
  background: rgba(14,14,26,0.8);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 6px 8px;
}

.nav-tab {
  padding: 7px 13px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  transition: all .15s;
  border-radius: 7px;
  border: 1px solid transparent;
}
.nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.nav-tab.active {
  color: var(--text);
  background: linear-gradient(135deg, var(--glow)22, var(--glow2)11);
  border-color: var(--glow)33;
}

#content { flex: 1; overflow-y: auto; padding: 20px; }

.sec-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 18px;
  letter-spacing: -0.3px;
}

.field-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 14px 0 6px;
}

.field {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  border-left: 2px solid var(--glow)66;
  display: flex;
  align-items: center;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.field:focus-within {
  border-color: var(--glow)44;
  box-shadow: 0 0 0 3px var(--glow)0d;
}
.field input, .field textarea, .field select {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  padding: 10px 12px;
  flex: 1;
  resize: none;
}
.field input::placeholder,
.field textarea::placeholder { color: var(--text3); }
.field select option { background: var(--bg3); }

select.standalone {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  padding: 9px 12px;
  border-radius: 10px;
  width: 100%;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
select.standalone:focus { border-color: var(--glow)44; }
select.standalone option { background: var(--bg2); }

.badge {
  background: rgba(108,99,255,0.08);
  border: 1px solid var(--glow)22;
  border-radius: 10px;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 12px;
}
.badge .name { color: var(--text); font-weight: 600; }
.badge .id   { color: var(--text3); font-size: 10px; font-family: 'JetBrains Mono', monospace; }

.btn {
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 11px 22px;
  transition: all .2s;
  margin-top: 16px;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity .2s;
}
.btn:hover::after { opacity: 1; }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-green  { background: var(--green); color: #080810; box-shadow: 0 4px 20px var(--green)44; }
.btn-green:hover { box-shadow: 0 6px 28px var(--green)66; }
.btn-red    { background: var(--red); color: #fff; box-shadow: 0 4px 20px var(--red)44; }
.btn-yellow { background: var(--yellow); color: #080810; box-shadow: 0 4px 20px var(--yellow)44; }
.btn-accent { background: var(--glow); color: #fff; box-shadow: 0 4px 20px var(--glow)44; }
.btn-purple { background: var(--purple); color: #080810; box-shadow: 0 4px 20px var(--purple)44; }
.btn-blue   { background: var(--blue); color: #080810; box-shadow: 0 4px 20px var(--blue)44; }
.btn-accent2{ background: var(--glow2); color: #fff; box-shadow: 0 4px 20px var(--glow2)44; }

.warn-box {
  background: rgba(255,209,102,0.07);
  border: 1px solid var(--yellow)33;
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 11px;
  color: var(--yellow);
  line-height: 1.6;
}

.radio-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.radio-opt {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  transition: all .15s;
}
.radio-opt:hover { border-color: var(--glow)44; color: var(--text); }
.radio-opt.sel {
  background: var(--glow)22;
  color: var(--text);
  border-color: var(--glow)66;
  box-shadow: 0 0 10px var(--glow)22;
}

.troll-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.troll-btn {
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 12px 10px;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.troll-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
.troll-btn:active { transform: translateY(0); }

/* ── LOGS ── */
#logs-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: rgba(8,8,16,0.8);
  backdrop-filter: blur(10px);
}

#logs-tabs {
  display: flex;
  background: rgba(14,14,26,0.8);
  border-bottom: 1px solid var(--border);
}

.log-tab {
  padding: 11px 18px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.log-tab.active { color: var(--glow); border-color: var(--glow); }

#log-header {
  background: rgba(255,255,255,0.02);
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
#log-header span { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }

#log-clear {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text3);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 10px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  transition: all .15s;
}
#log-clear:hover { color: var(--text2); background: rgba(255,255,255,0.1); }

#log-area {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.8;
}

.log-line { display: flex; gap: 10px; }
.log-time { color: var(--text3); flex-shrink: 0; }
.log-green  { color: var(--green); }
.log-red    { color: var(--red); }
.log-yellow { color: var(--yellow); }
.log-blue   { color: var(--blue); }
.log-purple { color: var(--purple); }
.log-dim    { color: var(--text3); }

/* scrollbars */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--glow)44; }

/* modal */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.show { display: flex; }

#modal {
  background: var(--bg2);
  border: 1px solid var(--glow)33;
  border-radius: 16px;
  padding: 28px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 40px var(--glow)11;
  animation: modalIn .2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalIn {
  from { transform: scale(.88) translateY(20px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
#modal h3 {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--glow), var(--glow2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#modal p { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 22px; }
#modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
#modal-ok   { background: var(--red); color: #fff; box-shadow: 0 4px 16px var(--red)44; }
#modal-cancel { background: rgba(255,255,255,0.08); color: var(--text2); box-shadow: none; }

#file-drop {
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  color: var(--text3);
  font-size: 11px;
  transition: all .15s;
  margin-top: 8px;
}
#file-drop:hover, #file-drop.dragover {
  border-color: var(--glow)66;
  color: var(--glow);
  background: var(--glow)08;
}
#file-drop input { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 2px solid var(--border);
  border-top-color: var(--glow);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 4px;
}

/* ── ENTRY ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
#topbar  { animation: fadeUp .4s ease both; }
#sidebar { animation: fadeUp .45s .05s ease both; }
#main    { animation: fadeUp .45s .1s ease both; }
#logs-panel { animation: fadeUp .45s .15s ease both; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo-wrap">
    <div id="logo">🍉 WatermelonBOT</div>
    <div id="ver">Panel · Web Edition</div>
  </div>

  <div class="status-badge">
    <div id="status-dot"></div>
    <span id="status-txt">Оффлайн</span>
  </div>

  <div id="topbar-right">
    <div id="token-wrap">
      <span style="color:var(--text3);font-size:11px">🔑</span>
      <input id="token-input" type="password" placeholder="Вставте токен..." autocomplete="off">
      <span id="token-eye" onclick="toggleTokenVis()">👁</span>
    </div>
    <button class="top-btn" id="tok-type-btn" onclick="toggleTokenType()">🤖 Bot</button>
    <button class="top-btn green" onclick="connectBot()">▶ Підключити</button>
    <button class="top-btn" onclick="refreshAll()">↺ Оновити</button>
  </div>
</div>

<!-- BODY -->
<div id="body">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-label">Сервери</div>
    <div class="list-box" id="guild-list" style="max-height:140px"></div>
    <div class="divider"></div>
    <div class="sb-label">Учасники</div>
    <input id="member-search" placeholder="Пошук..." oninput="filterMembers()">
    <div id="member-list"></div>
    <div id="sel-label">Нікого не обрано</div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="nav">
      <div class="nav-tab active" onclick="switchTab('msg')">💬 Написати</div>
      <div class="nav-tab"        onclick="switchTab('timeout')">⏱ Таймаут</div>
      <div class="nav-tab"        onclick="switchTab('kick')">👢 Кік</div>
      <div class="nav-tab"        onclick="switchTab('ban')">🔨 Бан</div>
      <div class="nav-tab"        onclick="switchTab('unban')">✅ Розбан</div>
      <div class="nav-tab"        onclick="switchTab('troll')">😈 ТРОЛЬ</div>
    </div>
    <div id="content"></div>
  </div>

  <!-- LOGS -->
  <div id="logs-panel">
    <div id="logs-tabs">
      <div class="log-tab active">🤖 Логи</div>
      <div class="log-tab" style="color:var(--green);border-bottom:2px solid var(--green)">
        📊 Статус: <span id="stat-text">очікування...</span>
      </div>
    </div>
    <div id="log-header">
      <span>Консоль</span>
      <button id="log-clear" onclick="clearLogs()">Очистити</button>
    </div>
    <div id="log-area"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Підтвердження</h3>
    <p  id="modal-body"></p>
    <div id="modal-btns">
      <button class="btn btn-accent" id="modal-cancel" onclick="modalCancel()">Скасувати</button>
      <button class="btn btn-red"    id="modal-ok"     onclick="modalConfirm()">Підтвердити</button>
    </div>
  </div>
</div>

<script>
// ── ANIMATED BACKGROUND PARTICLES ──────────────────────
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], lines = [];
  
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Орбіти / частинки
  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * 1500,
      y: Math.random() * 900,
      r: Math.random() * 1.5 + 0.3,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.5 + 0.1,
      color: Math.random() > 0.5 ? '108,99,255' : '255,101,132',
    });
  }

  // Великі glow-кулі
  const blobs = [
    { x: 0.15, y: 0.2, r: 280, color: '108,99,255', speed: 0.0003, phase: 0 },
    { x: 0.8,  y: 0.7, r: 240, color: '255,101,132', speed: 0.0004, phase: 2 },
    { x: 0.5,  y: 0.5, r: 200, color: '0,255,163', speed: 0.0002, phase: 4 },
  ];

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.01;

    // Blobs
    blobs.forEach(b => {
      const cx = (b.x + Math.sin(t * b.speed * 1000 + b.phase) * 0.08) * W;
      const cy = (b.y + Math.cos(t * b.speed * 800  + b.phase) * 0.06) * H;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, b.r);
      grad.addColorStop(0, `rgba(${b.color},0.06)`);
      grad.addColorStop(1, `rgba(${b.color},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    });

    // Particles
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
    });

    // Connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(108,99,255,${0.08 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

function updateFileList(files, listEl) {
  if (!files.length) { listEl.textContent = ""; return; }
  listEl.innerHTML = Array.from(files).map(f => `• ${f.name} (${(f.size/1024).toFixed(0)}KB)`).join("<br>");
}

//  MODAL
// ══════════════════════════════════════════════════════
function confirm2(title, body, cb) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").textContent  = body;
  document.getElementById("modal-overlay").classList.add("show");
  modalCb = cb;
}
function modalConfirm() {
  document.getElementById("modal-overlay").classList.remove("show");
  if (modalCb) { modalCb(); modalCb = null; }
}
function modalCancel() {
  document.getElementById("modal-overlay").classList.remove("show");
  modalCb = null;
}
document.getElementById("modal-overlay").onclick = e => {
  if (e.target === document.getElementById("modal-overlay")) modalCancel();
};
